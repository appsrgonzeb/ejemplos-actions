name: Pasando valores con output

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Escribe una variable
        id: genera-valor # Tenemos que ponerle un id para identificarlo
        run: echo "MI_VALOR=felipe" >> "$GITHUB_OUTPUT" # Lo asignamos a una variable especial de GITHUB

      - name: Obtiene la variable
        run: echo "${{steps.genera-valor.outputs.MI_VALOR}}"
        
