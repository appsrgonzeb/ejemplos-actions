name: Variables

on:
  workflow_dispatch: 

# 'Variables de ambiente (enviroment)'
env:
  variable_global: VARIABLE GLOBAL

jobs:
  job-1:
    runs-on: ubuntu-latest
    env:
      variable_job: VARIABLE JOB
    steps:
      - name: estep 1 del job-1
        run: |
          echo el valor de la variable global es $variable_global
          echo 'otra forma de escribir la variable es: ${{ env.variable_global }}'
          echo 'también podemos definir variables a nivel de un único job: ${{ env.variable_job }}'
          echo 'O variables a nivel de step como esta: ${{ env.variable-step }}'
        env:
          variable-step: VARIABLE STEP

      - name: step 2 del job-1
        run: |
          echo 'seguimos con acceso a la variable de WF: ${{ env.variable_global }}'
          echo 'seguimos con acceso a la variable del job: ${{ env.variable_job }}'

  job-2:
    runs-on: ubuntu-latest
    steps:
      - name: step1 del job 2
        run: | # Colocamos esto porque los : piensa que es el valor de un avariable
          echo echo 'seguimos con acceso a la variable de WF: ${{ env.variable_global }}'
    
          
        
        
      
  
